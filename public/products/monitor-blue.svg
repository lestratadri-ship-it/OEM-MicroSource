<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380">
<defs>
<linearGradient id="body-mon" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity="0.18"/>
  <stop offset="0.35" stop-color="#fff" stop-opacity="0.04"/>
  <stop offset="0.65" stop-color="#000" stop-opacity="0"/>
  <stop offset="1" stop-color="#000" stop-opacity="0.22"/>
</linearGradient>
<linearGradient id="vert-mon" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity="0.12"/>
  <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
  <stop offset="1" stop-color="#000" stop-opacity="0.12"/>
</linearGradient>
<radialGradient id="lens-mon" cx="0.32" cy="0.30" r="0.85">
  <stop offset="0" stop-color="#3A3A40"/>
  <stop offset="0.25" stop-color="#141416"/>
  <stop offset="0.7" stop-color="#050506"/>
  <stop offset="1" stop-color="#000"/>
</radialGradient>
<radialGradient id="screen-mon" cx="0.5" cy="0.4" r="0.75">
  <stop offset="0" stop-color="#1A2540" stop-opacity="0.55"/>
  <stop offset="0.5" stop-color="#0A1020" stop-opacity="0.35"/>
  <stop offset="1" stop-color="#000" stop-opacity="0"/>
</radialGradient>
<filter id="softblur-mon" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="6"/>
</filter>
</defs>
<!-- Soft ground shadow -->
<ellipse cx="210" cy="368" rx="140" ry="9" fill="#000" opacity="0.25" filter="url(#softblur-mon)"/>
<!-- Stand base (wide V-shape) -->
<path d="M130 320 L290 320 L310 360 L110 360 Z" fill="#22416A" stroke="rgba(0,0,0,0.4)"/>
<path d="M130 320 L290 320 L310 360 L110 360 Z" fill="url(#body-mon)"/>
<!-- Stand base ambient shadow underneath -->
<path d="M130 320 L290 320 L300 340 L120 340 Z" fill="rgba(0,0,0,0.15)"/>
<!-- Neck (tapered) -->
<path d="M196 262 L224 262 L220 320 L200 320 Z" fill="#22416A" stroke="rgba(0,0,0,0.4)"/>
<path d="M196 262 L224 262 L220 320 L200 320 Z" fill="url(#vert-mon)"/>
<!-- Screen frame (ultra-thin bezel) -->
<rect x="8" y="8" width="404" height="252" rx="8" fill="#22416A" stroke="rgba(0,0,0,0.4)"/>
<rect x="8" y="8" width="404" height="252" rx="8" fill="url(#body-mon)"/>
<!-- Top rim light -->
<rect x="25" y="8.5" width="370" height="0.6" fill="rgba(255,255,255,0.14)"/>
<!-- Left rim light -->
<rect x="8.5" y="25" width="0.6" height="215" fill="rgba(255,255,255,0.14)"/>
<!-- Screen glass -->
<rect x="14" y="14" width="392" height="232" rx="3" fill="#0A0E18" stroke="rgba(0,0,0,0.5)"/>
<!-- Screen content glow (subtle blue ambient) -->
<rect x="14" y="14" width="392" height="232" rx="3" fill="url(#screen-mon)"/>
<!-- Screen gloss reflection (top-left diagonal sweep) -->
<path d="M14 14 L180 14 L110 110 L14 110 Z" fill="rgba(255,255,255,0.04)"/>
<!-- Bottom bezel with tiny power LED -->
<circle cx="210" cy="253" r="1.8" fill="rgba(0,0,0,0.5)"/>
<circle cx="210" cy="253" r="0.6" fill="rgba(0,160,255,0.4)"/>
</svg>