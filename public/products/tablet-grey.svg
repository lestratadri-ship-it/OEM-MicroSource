<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440">
<defs>
<linearGradient id="body-tab" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity="0.18"/>
  <stop offset="0.35" stop-color="#fff" stop-opacity="0.04"/>
  <stop offset="0.65" stop-color="#000" stop-opacity="0"/>
  <stop offset="1" stop-color="#000" stop-opacity="0.22"/>
</linearGradient>
<linearGradient id="vert-tab" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity="0.12"/>
  <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
  <stop offset="1" stop-color="#000" stop-opacity="0.12"/>
</linearGradient>
<radialGradient id="lens-tab" cx="0.32" cy="0.30" r="0.85">
  <stop offset="0" stop-color="#3A3A40"/>
  <stop offset="0.25" stop-color="#141416"/>
  <stop offset="0.7" stop-color="#050506"/>
  <stop offset="1" stop-color="#000"/>
</radialGradient>
<radialGradient id="screen-tab" cx="0.5" cy="0.4" r="0.75">
  <stop offset="0" stop-color="#1A2540" stop-opacity="0.55"/>
  <stop offset="0.5" stop-color="#0A1020" stop-opacity="0.35"/>
  <stop offset="1" stop-color="#000" stop-opacity="0"/>
</radialGradient>
<filter id="softblur-tab" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="6"/>
</filter>
</defs>
<!-- Soft ground shadow -->
<ellipse cx="160" cy="430" rx="120" ry="10" fill="#000" opacity="0.22" filter="url(#softblur-tab)"/>
<!-- Body base -->
<rect x="30" y="20" width="260" height="400" rx="28" fill="#BEC3CA" stroke="rgba(0,0,0,0.16)" stroke-width="0.8"/>
<!-- Diagonal body gradient (highlight + shadow) -->
<rect x="30" y="20" width="260" height="400" rx="28" fill="url(#body-tab)"/>
<!-- Vertical subtle lighting -->
<rect x="30" y="20" width="260" height="400" rx="28" fill="url(#vert-tab)"/>
<!-- Rim light on left edge -->
<rect x="30.5" y="35" width="0.8" height="380" fill="rgba(255,255,255,0.35)"/>
<!-- Rim light on top edge (subtle) -->
<rect x="55" y="20.5" width="210" height="0.6" fill="rgba(255,255,255,0.35)"/>
<!-- Camera module (recessed) -->
<rect x="128" y="42" width="64" height="64" rx="16" fill="#8A9099" stroke="rgba(0,0,0,0.4)" stroke-width="0.6"/>
<rect x="128" y="42" width="64" height="64" rx="16" fill="url(#body-tab)" opacity="0.5"/>
<!-- Main lens (multi-layer) -->
<circle cx="148" cy="62" r="11" fill="url(#lens-tab)"/>
<circle cx="148" cy="62" r="7.5" fill="#050506"/>
<circle cx="148" cy="62" r="4" fill="#000"/>
<ellipse cx="145.5" cy="58.5" rx="2.8" ry="1.8" fill="rgba(255,255,255,0.3)"/>
<ellipse cx="150" cy="64" rx="1" ry="0.6" fill="rgba(255,255,255,0.15)"/>
<!-- Secondary lens -->
<circle cx="172" cy="62" r="8" fill="url(#lens-tab)"/>
<circle cx="172" cy="62" r="5" fill="#050506"/>
<circle cx="172" cy="62" r="2.5" fill="#000"/>
<ellipse cx="170" cy="59.5" rx="1.8" ry="1" fill="rgba(255,255,255,0.22)"/>
<!-- Flash + microphone -->
<circle cx="160" cy="92" r="3.2" fill="#111"/>
<circle cx="160" cy="92" r="1.8" fill="#000"/>
<circle cx="160" cy="92" r="0.9" fill="rgba(255,255,255,0.3)"/>
<!-- Subtle bottom shadow (ambient) -->
<rect x="50" y="418" width="220" height="2" fill="#000" opacity="0.25" rx="1"/>
</svg>